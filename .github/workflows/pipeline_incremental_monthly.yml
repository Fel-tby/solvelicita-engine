name: Pipeline Incremental Mensal Nacional

on:
  workflow_dispatch:
  schedule:
    # 00:00 America/Sao_Paulo/Brasilia = 03:00 UTC
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: incremental-monthly-national
  cancel-in-progress: false

jobs:
  collect-incremental-matrix:
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        uf:
          - AC
          - AL
          - AM
          - AP
          - BA
          - CE
          - DF
          - ES
          - GO
          - MA
          - MG
          - MS
          - MT
          - PA
          - PB
          - PE
          - PI
          - PR
          - RJ
          - RN
          - RO
          - RR
          - RS
          - SC
          - SE
          - SP
          - TO
    uses: ./.github/workflows/pipeline_state_runner.yml
    secrets: inherit
    with:
      uf: ${{ matrix.uf }}
      mode: incremental
      steps: collect
      collectors: municipios,siconfi,dca,pncp
      timeout_minutes: 300
      artifact_prefix: incremental-monthly-collect

  dbt-once:
    needs: collect-incremental-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      BQ_ENABLED: "true"
      BQ_DATASET: "raw"
      GCP_SA_KEY_PATH: ${{ github.workspace }}/gcp-credentials.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap pipeline runtime
        uses: ./.github/actions/setup-pipeline-runtime
        with:
          python-version: "3.11"
          gcp-sa-key: ${{ secrets.GCP_SA_KEY }}

      - name: Run dbt once
        shell: bash
        run: ./venv_dbt/bin/dbt run --project-dir dbt --profiles-dir dbt

      - name: Upload dbt logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incremental-monthly-dbt
          path: dbt/logs/
          if-no-files-found: ignore

  process-score-sync-matrix:
    needs: dbt-once
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        uf:
          - AC
          - AL
          - AM
          - AP
          - BA
          - CE
          - DF
          - ES
          - GO
          - MA
          - MG
          - MS
          - MT
          - PA
          - PB
          - PE
          - PI
          - PR
          - RJ
          - RN
          - RO
          - RR
          - RS
          - SC
          - SE
          - SP
          - TO
    uses: ./.github/workflows/pipeline_state_runner.yml
    secrets: inherit
    with:
      uf: ${{ matrix.uf }}
      mode: incremental
      steps: process,score,sync
      timeout_minutes: 240
      artifact_prefix: incremental-monthly-final

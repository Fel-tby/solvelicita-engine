name: Pipeline State Runner

on:
  workflow_call:
    inputs:
      uf:
        description: "UF alvo"
        required: true
        type: string
      mode:
        description: "Modo de coleta"
        required: false
        default: "incremental"
        type: string
      steps:
        description: "Etapas separadas por virgula"
        required: false
        default: "collect,dbt,process,score,sync"
        type: string
      collectors:
        description: "Coletores separados por virgula"
        required: false
        default: ""
        type: string
      timeout_minutes:
        description: "Timeout do job em minutos"
        required: false
        default: 360
        type: number
      artifact_prefix:
        description: "Prefixo do artifact"
        required: false
        default: "pipeline"
        type: string

permissions:
  contents: read

jobs:
  run-state:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      BQ_ENABLED: "true"
      BQ_DATASET: "raw"
      GCP_SA_KEY_PATH: ${{ github.workspace }}/gcp-credentials.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap pipeline runtime
        uses: ./.github/actions/setup-pipeline-runtime
        with:
          python-version: "3.11"
          gcp-sa-key: ${{ secrets.GCP_SA_KEY }}

      - name: Run pipeline for state
        shell: bash
        env:
          INPUT_UF: ${{ inputs.uf }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_STEPS: ${{ inputs.steps }}
          INPUT_COLLECTORS: ${{ inputs.collectors }}
        run: |
          cmd=(
            ./venv/bin/python
            pipeline.py
            --uf "$INPUT_UF"
            --mode "$INPUT_MODE"
            --steps "$INPUT_STEPS"
            --yes
          )

          if [ -n "$INPUT_COLLECTORS" ]; then
            cmd+=(--collectors "$INPUT_COLLECTORS")
          fi

          "${cmd[@]}"

      - name: Upload logs and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.uf }}
          path: |
            dbt/logs/
            data/outputs/${{ inputs.uf }}/
            data/processed/${{ inputs.uf }}/
            data/analysis/${{ inputs.uf }}/
          if-no-files-found: ignore

name: Pipeline Incremental Semanal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: pipeline-incremental-weekly
  cancel-in-progress: false

jobs:
  incremental-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      BQ_ENABLED: "true"
      BQ_DATASET: "raw"
      GCP_SA_KEY_PATH: ${{ github.workspace }}/gcp-credentials.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap pipeline runtime
        uses: ./.github/actions/setup-pipeline-runtime
        with:
          python-version: "3.11"
          gcp-sa-key: ${{ secrets.GCP_SA_KEY }}

      - name: Run weekly incremental pipeline
        shell: bash
        run: |
          ./venv/bin/python pipeline.py \
            --uf ALL \
            --mode incremental \
            --steps collect,dbt,process,score,sync \
            --collectors siconfi,dca,pncp \
            --yes

      - name: Upload logs and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incremental-weekly-artifacts
          path: |
            dbt/logs/
            data/outputs/
            data/processed/
            data/analysis/
          if-no-files-found: ignore

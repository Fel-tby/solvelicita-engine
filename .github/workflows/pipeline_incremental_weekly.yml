name: Pipeline Incremental Semanal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

permissions:
  contents: read

concurrency:
  group: pipeline-incremental-weekly
  cancel-in-progress: false

jobs:
  incremental-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      BQ_ENABLED: "true"
      BQ_DATASET: "raw"
      GCP_SA_KEY_PATH: ${{ github.workspace }}/gcp-credentials.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup main venv
        shell: bash
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Setup dbt venv
        shell: bash
        run: |
          python -m venv venv_dbt
          ./venv_dbt/bin/python -m pip install --upgrade pip
          ./venv_dbt/bin/pip install dbt-core dbt-bigquery

      - name: Materialize credentials
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          printf '%s' "$GCP_SA_KEY" > "$GCP_SA_KEY_PATH"
          cat > .env <<EOF
          GCP_SA_KEY_PATH=$GCP_SA_KEY_PATH
          GCP_PROJECT_ID=$GCP_PROJECT_ID
          BQ_ENABLED=$BQ_ENABLED
          BQ_DATASET=$BQ_DATASET
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_KEY=$SUPABASE_KEY
          EOF
          mkdir -p dbt
          cat > dbt/profiles.yml <<EOF
          solvelicita:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: $GCP_PROJECT_ID
                dataset: staging
                location: southamerica-east1
                keyfile: "$GCP_SA_KEY_PATH"
                threads: 4
          EOF

      - name: Run dbt deps
        shell: bash
        run: ./venv_dbt/bin/dbt deps --project-dir dbt --profiles-dir dbt

      - name: Run weekly incremental pipeline
        shell: bash
        run: |
          ./venv/bin/python pipeline.py \
            --uf ALL \
            --mode incremental \
            --steps collect,dbt,process,score,sync \
            --collectors siconfi,dca,pncp \
            --yes

      - name: Upload logs and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incremental-weekly-artifacts
          path: |
            dbt/logs/
            data/outputs/
            data/processed/
            data/analysis/
          if-no-files-found: ignore

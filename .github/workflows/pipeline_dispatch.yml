name: Pipeline Manual

on:
  workflow_dispatch:
    inputs:
      uf:
        description: "UF alvo (ex.: PB, CE, RN ou ALL)"
        required: true
        default: "ALL"
      mode:
        description: "Modo de coleta"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
      steps:
        description: "Etapas separadas por virgula"
        required: true
        default: "collect,dbt,process,score,sync"
      collectors:
        description: "Coletores separados por virgula; deixe vazio para legado ALL-CAUC"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: pipeline-dispatch-${{ github.event.inputs.uf }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  pipeline-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      BQ_ENABLED: "true"
      BQ_DATASET: "raw"
      GCP_SA_KEY_PATH: ${{ github.workspace }}/gcp-credentials.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap pipeline runtime
        uses: ./.github/actions/setup-pipeline-runtime
        with:
          python-version: "3.11"
          gcp-sa-key: ${{ secrets.GCP_SA_KEY }}

      - name: Run manual pipeline
        shell: bash
        env:
          INPUT_UF: ${{ github.event.inputs.uf }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_STEPS: ${{ github.event.inputs.steps }}
          INPUT_COLLECTORS: ${{ github.event.inputs.collectors }}
        run: |
          cmd=(
            ./venv/bin/python
            pipeline.py
            --uf "$INPUT_UF"
            --mode "$INPUT_MODE"
            --steps "$INPUT_STEPS"
            --yes
          )

          if [ -n "$INPUT_COLLECTORS" ]; then
            cmd+=(--collectors "$INPUT_COLLECTORS")
          fi

          "${cmd[@]}"

      - name: Upload logs and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-dispatch-artifacts
          path: |
            dbt/logs/
            data/outputs/
            data/processed/
            data/analysis/
          if-no-files-found: ignore
